<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<body style="margin:0; padding:0; background-color:#000000;">

<table th:replace="~{email/layout.html :: header}"></table>

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#000000;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background-color:#111111;
                          border-left: 1px solid RGBA(255,255,255,0.2);
                          border-right: 1px solid RGBA(255,255,255,0.2);">
                <tr>
                    <td style="padding: 40px; font-family:Arial,sans-serif;">

                        <h2 style="color:#ffffff; font-size:20px; font-weight:bold; margin:0 0 14px 0;">
                            Hello, <span th:text="${firstName}">User</span>!
                        </h2>

                        <p style="color:RGBA(255,255,255,0.6); font-size:15px; line-height:1.7; margin:0 0 32px 0;">
                            You requested a password reset for your KickOff Bet account.
                            Click the button below to set a new password.
                        </p>

                        <!-- CTA Button -->
                        <div style="text-align:center; margin:0 0 32px 0;">
                            <a th:href="${link}"
                               style="background-color:#3b82f6;
                                      color:#ffffff;
                                      padding:14px 40px;
                                      text-decoration:none;
                                      border-radius:8px;
                                      font-size:15px;
                                      font-weight:bold;
                                      display:inline-block;
                                      font-family:Arial,sans-serif;">
                                Reset Password
                            </a>
                        </div>

                        <!-- Info box -->
                        <div style="background-color:RGBA(255,255,255,0.05);
                                    border:1px solid RGBA(255,255,255,0.15);
                                    border-radius:8px;
                                    padding:16px 20px;">
                            <p style="color:RGBA(255,255,255,0.45); font-size:13px; margin:0; line-height:1.7;">
                                This link expires in
                                <strong style="color:RGBA(255,255,255,0.85);">1 hour</strong>.<br/>
                                If you did not request a password reset, your account is safe —
                                please ignore this email.
                            </p>
                        </div>

                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>

<table th:replace="~{email/layout.html :: footer}"></table>

</body>
</html>
