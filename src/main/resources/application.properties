spring.application.name=KickOffBet
server.port=8080
spring.jackson.time-zone=Europe/Bucharest

# Database - Mapate la variabilele din .env
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Security & JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail - Mapate la variabilele din .env
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}

# MinIO - Mapate la variabilele din .env
minio.endpoint=http://localhost:9000
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket.id-cards=id-cards
minio.bucket.teams=teams
minio.bucket.leagues=leagues
minio.public-url=http://localhost:9000

# Football Data
football.data.api.url=https://api.football-data.org/v4/
football.data.api.token=${FOOTBALL_DATA_TOKEN}

# Restul setarilor tehnice (raman la fel)
spring.jackson.parser.max-number-length=100
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
rate-limit.email.capacity=1
rate-limit.email.refill-minutes=1
rate-limit.auth.capacity=3
rate-limit.auth.refill-hours=1
rate-limit.login.max-attempts=10
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.munte.KickOffBet=DEBUG

# Betting Engine Logic
betting.margin=0.92
betting.home-advantage=1.20
betting.odds-floor=1.10
betting.odds-cap=50.00
betting.lambda-cap=4.0
betting.draw-min-probability=0.15
betting.weight.season=0.4
betting.weight.last5=0.6
betting.weight.draw-poisson=0.7
betting.weight.draw-historical=0.3
betting.weight.over-poisson=0.8
betting.weight.over-historical=0.2
betting.weight.btts-poisson=0.8
betting.weight.btts-historical=0.2
betting.poisson.max-goals=8
betting.lines.over-under=1.5,2.5,3.5
sync.api-delay-ms=6500
sync.range.past-days=3
sync.range.future-days=7
sync.cooldown-seconds=50

# AML Configuration
aml.monthly-limit=10000
aml.velocity-window-minutes=10
aml.velocity-max-transactions=5
aml.wagering-requirement=0.50